apiVersion: certmanager.k8s.io/v1alpha1
kind: Certificate
metadata:
  name: k8s-deadinsi-de
spec:
  secretName: k8s-deadinsi.de
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
  commonName: k8s.deadinsi.de
  dnsNames:
  - k8s.deadinsi.de
  acme:
    config:
    - http01:
        ingressClass: nginx
      domains:
      - k8s.deadinsi.de